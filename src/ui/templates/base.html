<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ArtCRM Supervisor{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
  <nav>
    <span class="nav-brand">ArtCRM Supervisor</span>
    <a href="/approvals/" {% if request.url.path.startswith('/approvals') %}class="active"{% endif %}>
      Approvals
    </a>
    <a href="/contacts/" {% if request.url.path.startswith('/contacts') %}class="active"{% endif %}>
      Contacts
    </a>
    <a href="/activity/" {% if request.url.path.startswith('/activity') %}class="active"{% endif %}>
      Activity
    </a>
    <a href="/people/" {% if request.url.path.startswith('/people') %}class="active"{% endif %}>
      People
    </a>
    <a href="/research/" {% if request.url.path.startswith('/research') %}class="active"{% endif %}>
      Research
    </a>
    <a href="/inbox/" {% if request.url.path.startswith('/inbox') %}class="active"{% endif %}>
      Inbox
    </a>
    <a href="/marketing/" {% if request.url.path.startswith('/marketing') %}class="active"{% endif %}>
      Marketing
    </a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
